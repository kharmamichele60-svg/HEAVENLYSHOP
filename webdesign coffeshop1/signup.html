<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee House - Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(to right,#3e2723,#6d4c41);
  color:white;
}


.navbar {
    background: rgba(0,0,0,0.3);
    padding: 15px;
    text-align: center;
}
.navbar a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

.navbar a:hover {
    color: #ffcc80;
}

.logo{font-size:1.5rem;font-weight:600}


.container{
  max-width:500px;
  margin:40px auto;
  background:rgba(255,255,255,0.1);
  padding:25px;
  border-radius:15px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
}

label{
  font-size:0.9rem;
}

.checkbox-group{
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#ffcc80;
  color:#3e2723;
  cursor:pointer;
}

button:hover{transform:scale(1.05)}

.footer{
  text-align:center;
  padding:15px;
  background:rgba(0,0,0,0.3);
  margin-top:30px;
}

</style>
</head>

<body>


<div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="faq.html">FAQ</a>
    <a href="gallery.html">Gallery</a>
    <a href="reviews.html">Reviews</a>
    <a href="services.html">Services</a>
    <a href="signup.html">Signup</a>
    <a href="survey.html">Survey</a>
</div>


<div class="container">
  <h1>Create Account</h1>

  <form>
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <input type="password" placeholder="Confirm Password" required>

    <label>Favorite Coffee Type:</label>
    <select>
      <option>Espresso</option>
      <option>Latte</option>
      <option>Cappuccino</option>
      <option>Americano</option>
    </select>

    <div class="checkbox-group">
      <input type="checkbox" id="news">
      <label for="news"> Subscribe to newsletter</label>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" id="terms" required>
      <label for="terms"> I agree to terms and conditions</label>
    </div>

    <button type="submit">Sign Up</button>
  </form>
</div>


<div class="footer">
  <p>© Coffee Shop 2026</p>
</div>

</body>
</html>
